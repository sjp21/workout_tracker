<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stimulus">
<meta name="theme-color" content="#0b0d0c">
<title>Stimulus — Evidence-Based Hypertrophy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d0c;
    --panel: #131816;
    --panel-2: #1a201d;
    --line: #232b27;
    --ink: #e8ebe6;
    --ink-dim: #8a9590;
    --ink-faint: #4a544f;
    --accent: #d4ff4a;
    --accent-2: #ff5b3a;
    --warn: #ffc14a;
    --ok: #6ee7a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(212,255,74,0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255,91,58,0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 20px 16px 100px; }

  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .tagline {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 6px;
  }

  .day-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    background: var(--panel);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .day-tab {
    padding: 10px 4px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .day-tab.active {
    background: var(--accent);
    color: #0b0d0c;
  }
  .day-tab .day-num { display: block; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 800; line-height: 1; margin-bottom: 2px; }

  .day-header {
    margin-bottom: 16px;
  }
  .day-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .day-subtitle {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .session-meta {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    padding: 12px;
    background: var(--panel);
    border-radius: 8px;
    border: 1px solid var(--line);
  }
  .session-meta div { flex: 1; }
  .session-meta .label { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .session-meta .val { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--accent); margin-top: 2px; }

  .exercise {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .exercise.complete { border-color: var(--ok); }
  .ex-head {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .ex-name {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .ex-tags {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .ex-tag {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    background: var(--panel-2);
    border-radius: 4px;
  }
  .ex-suggest {
    text-align: right;
    font-size: 11px;
  }
  .ex-suggest .weight {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .ex-suggest .label {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  .ex-body {
    border-top: 1px solid var(--line);
    padding: 12px 16px 14px;
    display: none;
  }
  .exercise.open .ex-body { display: block; }
  .exercise.open .ex-head { padding-bottom: 10px; }

  .last-session {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
  }
  .last-session span { color: var(--ink); }

  .set-row {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 50px 36px;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
  }
  .set-row.header {
    font-size: 9px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }
  .set-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    color: var(--ink-dim);
    text-align: center;
  }
  .set-row.done .set-num { color: var(--ok); }
  .set-input {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }
  .set-input::-webkit-outer-spin-button, .set-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .rir-select {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 4px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    text-align: center;
  }
  .set-check {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--line);
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }
  .set-check svg { width: 16px; height: 16px; opacity: 0; transition: opacity 0.15s; }
  .set-row.done .set-check { background: var(--ok); border-color: var(--ok); }
  .set-row.done .set-check svg { opacity: 1; }

  /* Rest timer pill */
  .rest-timer {
    grid-column: 1 / -1;
    margin-top: 4px;
    padding: 10px 12px;
    background: linear-gradient(90deg, rgba(212,255,74,0.10), rgba(212,255,74,0.02));
    border: 1px solid rgba(212,255,74,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    animation: timer-pulse 1.6s ease-in-out infinite;
  }
  @keyframes timer-pulse {
    0%, 100% { border-color: rgba(212,255,74,0.3); }
    50% { border-color: rgba(212,255,74,0.7); }
  }
  .rest-timer.done {
    background: linear-gradient(90deg, rgba(110,231,163,0.18), rgba(110,231,163,0.04));
    border-color: var(--ok);
    animation: none;
  }
  .rest-timer .rt-label {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    line-height: 1.1;
  }
  .rest-timer.done .rt-label { color: var(--ok); }
  .rest-timer .rt-time {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .rest-timer.done .rt-time { color: var(--ok); }
  .rest-timer .rt-left { display: flex; flex-direction: column; gap: 3px; }
  .rest-timer .rt-controls { display: flex; gap: 6px; }
  .rest-timer button {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 10px 14px;
    min-height: 38px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    touch-action: manipulation;
  }
  .rest-timer button:hover { border-color: var(--accent); }
  .rest-timer button.danger { color: var(--accent-2); }

  .nav-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(11,13,12,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--line);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .nav-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    border-radius: 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .nav-btn.primary { background: var(--accent); color: #0b0d0c; border-color: var(--accent); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .modal .sub {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  .citation {
    background: var(--panel-2);
    border-left: 2px solid var(--accent);
    padding: 10px 12px;
    margin-bottom: 10px;
    border-radius: 0 8px 8px 0;
    font-size: 12px;
  }
  .citation .study {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .citation .finding {
    color: var(--ink-dim);
    font-size: 11px;
    line-height: 1.5;
  }
  .citation .ref {
    color: var(--accent);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
  }

  /* History view */
  .hist-ex {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .hist-ex h3 {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .hist-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--line);
  }
  .hist-row:last-child { border: none; }
  .hist-row .date { color: var(--ink-dim); }
  .hist-row .data { font-family: 'JetBrains Mono', monospace; }
  .hist-row .data .up { color: var(--ok); }
  .hist-row .data .down { color: var(--accent-2); }

  .progress-suggest {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.5;
  }
  .progress-suggest.up { background: rgba(110,231,163,0.08); border: 1px solid rgba(110,231,163,0.2); color: var(--ok); }
  .progress-suggest.hold { background: rgba(255,193,74,0.08); border: 1px solid rgba(255,193,74,0.2); color: var(--warn); }
  .progress-suggest.down { background: rgba(255,91,58,0.08); border: 1px solid rgba(255,91,58,0.2); color: var(--accent-2); }

  .icon-info {
    width: 14px; height: 14px;
    border: 1px solid var(--ink-dim);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--ink-dim);
    cursor: pointer;
    margin-left: 4px;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  .empty {
    text-align: center;
    color: var(--ink-faint);
    padding: 40px 20px;
    font-size: 12px;
  }

  @media (min-width: 640px) {
    .container { padding: 32px 24px 100px; }
  }

  /* ============ MODE SWITCHER ============ */
  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: var(--panel);
    padding: 5px;
    border-radius: 12px;
    margin-bottom: 16px;
    border: 1px solid var(--line);
  }
  .mode-btn {
    padding: 12px 8px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--ink-dim);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent); color: #0b0d0c; }
  .mode-btn .icon { font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 400; text-transform: uppercase; letter-spacing: 0.15em; display: block; margin-top: 2px; opacity: 0.8; }

  /* ============ NUTRITION VIEW ============ */
  .nutri-hero {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .nutri-hero::before {
    content: '';
    position: absolute;
    inset: -50% -20% auto auto;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,255,74,0.08), transparent 60%);
    pointer-events: none;
  }
  .nutri-date {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .nutri-kcal {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-top: 4px;
  }
  .nutri-kcal .of { color: var(--ink-dim); font-size: 24px; font-weight: 400; }
  .nutri-kcal .unit { color: var(--ink-dim); font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 6px; }
  .nutri-remaining {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .nutri-remaining.over { color: var(--accent-2); }

  .macro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .macro-card {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }
  .macro-label {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .macro-val {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
    line-height: 1;
  }
  .macro-target {
    font-size: 10px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .macro-bar {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .macro-bar-fill {
    height: 100%;
    transition: width 0.3s;
    border-radius: 2px;
  }
  .macro-card.protein .macro-val { color: var(--accent); }
  .macro-card.protein .macro-bar-fill { background: var(--accent); }
  .macro-card.carbs .macro-val { color: var(--warn); }
  .macro-card.carbs .macro-bar-fill { background: var(--warn); }
  .macro-card.fat .macro-val { color: var(--accent-2); }
  .macro-card.fat .macro-bar-fill { background: var(--accent-2); }

  /* Quick add */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    margin: 20px 0 10px;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title .sub-action {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  .food-form {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .food-form-row {
    display: grid;
    gap: 8px;
    margin-bottom: 8px;
  }
  .food-form input, .food-form select {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 100%;
  }
  .food-form input:focus, .food-form select:focus { outline: none; border-color: var(--accent); }
  .food-form .macros-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
  }
  .food-form .macros-row input { text-align: center; padding: 10px 4px; }
  .food-form .field-label {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: block;
  }
  .add-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #0b0d0c;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    margin-top: 4px;
  }

  /* Food log entries */
  .meal-group {
    margin-bottom: 14px;
  }
  .meal-header {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 8px 4px;
    display: flex;
    justify-content: space-between;
  }
  .meal-header .meal-kcal { color: var(--ink); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .food-entry {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .food-entry .name {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
  }
  .food-entry .breakdown {
    font-size: 10px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .food-entry .kcal-pill {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }
  .food-entry .delete-btn {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }
  .food-entry .delete-btn:hover { color: var(--accent-2); }

  /* Profile setup card */
  .profile-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .profile-card h3 {

<script>
// ============================================================
// EVIDENCE BASE
// All protocol decisions cite peer-reviewed meta-analyses
// indexed on PubMed/NCBI with high participant counts.
// ============================================================
const EVIDENCE = [
  {
    study: "Schoenfeld, Ogborn & Krieger (2017)",
    finding: "Meta-regression of 15 studies / 34 treatment groups. Each additional weekly set produced a 0.37% increase in muscle hypertrophy. 10+ sets per muscle per week optimal.",
    ref: "J Sports Sci · PMID: 27433992 · used for: weekly volume per muscle"
  },
  {
    study: "Refalo et al. (2022)",
    finding: "Meta-analysis of 15 studies. Training to failure showed only a trivial advantage over non-failure (ES=0.19). RIR 0–3 produces equivalent hypertrophy with less fatigue.",
    ref: "Sports Med · PMID: 36334240 · used for: RIR 1–3 prescription"
  },
  {
    study: "Morton et al. (2018)",
    finding: "Meta-analysis of 49 studies, 1,863 participants. Protein intake of ~1.6 g/kg/day maximizes RT-induced gains in fat-free mass. Upper CI: 2.2 g/kg/day.",
    ref: "Br J Sports Med · PMID: 28698222 · used for: protein target"
  },
  {
    study: "Schoenfeld, Grgic & Krieger (2019)",
    finding: "Meta-analysis of 25 studies on training frequency. When weekly volume is equated, frequency (1x vs 2x vs 3x/week per muscle) does not meaningfully affect hypertrophy.",
    ref: "Sports Med · PMID: 30558493 · used for: 2x/week per muscle structure"
  },
  {
    study: "Schoenfeld, Grgic, Ogborn & Krieger (2017)",
    finding: "Meta-analysis on load. Loads from ~30% to ~85% 1RM produce equivalent hypertrophy when sets are taken close to failure. Validates moderate-load DB training.",
    ref: "J Strength Cond Res · PMID: 28834797 · used for: load tolerance with adjustable DBs"
  },
  {
    study: "Schoenfeld et al. (2016) — rest intervals",
    finding: "Longer rest (3 min) produced greater hypertrophy than short (1 min) in trained men. 2–3 min recommended for compounds.",
    ref: "J Strength Cond Res · PMID: 26605807 · used for: rest period defaults"
  },
  {
    study: "Mifflin & St Jeor (1990) + validation studies",
    finding: "Mifflin-St Jeor equation validated across multiple cohorts including a 337-subject ambulatory validation study. Most accurate predictive equation for healthy adults: 82% of estimates within 10% of indirect calorimetry. Unbiased (95% CI −26 to +8 kcal/day).",
    ref: "Am J Clin Nutr · PMID: 2305711 · used for: RMR calculation"
  },
  {
    study: "Murphy & Koehler (2022)",
    finding: "Systematic review and meta-regression on resistance training during caloric deficit. A deficit of ~500 kcal/day prevented gains in lean mass while strength gains remained comparable. Smaller deficits preserve growth potential while still driving fat loss.",
    ref: "Scand J Med Sci Sports · PMID: 34623696 · used for: caloric deficit target"
  },
  {
    study: "Schoenfeld & Aragon (2018)",
    finding: "Review of per-meal protein utilization for muscle anabolism. Conclusion: 0.4 g/kg protein per meal across ≥4 meals optimizes muscle protein synthesis. For upper intake of 2.2 g/kg/day, 0.55 g/kg per meal across 4 meals.",
    ref: "J Int Soc Sports Nutr · PMID: 29497353 · used for: per-meal protein distribution"
  }
];

// ============================================================
// PROGRAM
// 4-day upper/lower hybrid, dumbbell-only.
// Volume per muscle/week meets Schoenfeld 2017 dose-response (10+ sets).
// All exercises in 6–15 rep ranges (Schoenfeld 2017 load tolerance).
// ============================================================
const PROGRAM = [
  {
    id: 'd1', name: 'Push', focus: 'Chest · Shoulders · Triceps',
    exercises: [
      { id: 'incdbp1', name: 'Incline DB Press (15–30°)', tags: ['upper chest', 'compound'], sets: 4, repLow: 6, repHigh: 10, increment: 5, rest: 180 },
      { id: 'flatdbp', name: 'Flat DB Press', tags: ['chest', 'compound'], sets: 3, repLow: 8, repHigh: 12, increment: 5, rest: 150 },
      { id: 'incdbfly', name: 'Incline DB Fly', tags: ['chest', 'isolation'], sets: 3, repLow: 10, repHigh: 15, increment: 2.5, rest: 90 },
      { id: 'dbshp', name: 'Seated DB Shoulder Press', tags: ['shoulders', 'compound'], sets: 3, repLow: 8, repHigh: 12, increment: 5, rest: 150 },
      { id: 'dblat', name: 'DB Lateral Raise', tags: ['shoulders', 'isolation'], sets: 3, repLow: 12, repHigh: 20, increment: 2.5, rest: 60 },
      { id: 'dbohtri', name: 'Overhead DB Tricep Extension', tags: ['triceps', 'isolation'], sets: 3, repLow: 10, repHigh: 12, increment: 2.5, rest: 90 },
      { id: 'dbskull', name: 'DB Skull Crushers', tags: ['triceps', 'isolation'], sets: 3, repLow: 10, repHigh: 12, increment: 2.5, rest: 90 }
    ]
  },
  {
    id: 'd2', name: 'Pull', focus: 'Back · Biceps · Posterior Chain',
    exercises: [
      { id: 'dbrow1', name: 'One-Arm DB Row', tags: ['back', 'compound'], sets: 4, repLow: 8, repHigh: 12, increment: 5, rest: 150 },
      { id: 'dbcsrow', name: 'Chest-Supported DB Row', tags: ['back', 'compound'], sets: 3, repLow: 10, repHigh: 12, increment: 5, rest: 120 },
      { id: 'dbpull', name: 'DB Pullover', tags: ['lats', 'chest'], sets: 3, repLow: 10, repHigh: 12, increment: 2.5, rest: 90 },
      { id: 'dbrdl1', name: 'DB Romanian Deadlift', tags: ['hamstrings', 'posterior'], sets: 3, repLow: 8, repHigh: 10, increment: 5, rest: 150 },
      { id: 'dbcurl1', name: 'DB Curl', tags: ['biceps', 'isolation'], sets: 3, repLow: 8, repHigh: 12, increment: 2.5, rest: 90 },
      { id: 'dbham', name: 'DB Hammer Curl', tags: ['biceps', 'brachialis'], sets: 3, repLow: 10, repHigh: 12, increment: 2.5, rest: 90 },
      { id: 'dbinccurl', name: 'DB Incline Curl', tags: ['biceps', 'long head'], sets: 3, repLow: 10, repHigh: 12, increment: 2.5, rest: 90 }
    ]
  },
  {
    id: 'd3', name: 'Legs', focus: 'Quads · Hams · Glutes · Core',
    exercises: [
      { id: 'dbgs', name: 'DB Goblet Squat', tags: ['quads', 'compound'], sets: 4, repLow: 10, repHigh: 12, increment: 5, rest: 150 },
      { id: 'dbbss', name: 'DB Bulgarian Split Squat', tags: ['quads', 'glutes'], sets: 3, repLow: 8, repHigh: 10, increment: 2.5, rest: 120 },
      { id: 'dbrdl2', name: 'DB Romanian Deadlift', tags: ['hamstrings', 'posterior'], sets: 4, repLow: 8, repHigh: 10, increment: 5, rest: 150 },
      { id: 'dblunge', name: 'DB Walking Lunge', tags: ['quads', 'glutes'], sets: 3, repLow: 10, repHigh: 10, increment: 2.5, rest: 120 },
      { id: 'dbcalf', name: 'DB Calf Raise', tags: ['calves', 'isolation'], sets: 3, repLow: 15, repHigh: 20, increment: 2.5, rest: 60 },
      { id: 'hangleg', name: 'Hanging Leg Raise / Plank', tags: ['core'], sets: 3, repLow: 10, repHigh: 15, increment: 0, rest: 60 }
    ]
  },
  {
    id: 'd4', name: 'Upper', focus: 'Chest + Arms Emphasis',
    exercises: [
      { id: 'incdbp2', name: 'Incline DB Press', tags: ['upper chest', 'compound'], sets: 4, repLow: 8, repHigh: 12, increment: 5, rest: 150 },
      { id: 'flatfly', name: 'Flat DB Fly', tags: ['chest', 'isolation'], sets: 3, repLow: 10, repHigh: 15, increment: 2.5, rest: 90 },
      { id: 'dbfp', name: 'DB Floor Press (slow)', tags: ['chest', 'triceps'], sets: 3, repLow: 6, repHigh: 10, increment: 5, rest: 150 },
      { id: 'db21', name: 'DB Curl 21s', tags: ['biceps', 'isolation'], sets: 3, repLow: 21, repHigh: 21, increment: 2.5, rest: 90 },
      { id: 'cgdbp', name: 'Close-Grip DB Press', tags: ['triceps', 'chest'], sets: 3, repLow: 8, repHigh: 12, increment: 5, rest: 120 },
      { id: 'hamskull', name: 'Hammer + Skull Superset', tags: ['biceps', 'triceps'], sets: 3, repLow: 10, repHigh: 10, increment: 2.5, rest: 90 }
    ]
  }
];

// ============================================================
// STATE — persisted to localStorage
// Data survives tab close, browser restart, and device restart.
// Cleared only if user clears site data or taps Reset.
// ============================================================
const STORAGE_KEY = 'hypertrophy-lab-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        mode: parsed.mode || 'train',
        currentDayIdx: parsed.currentDayIdx || 0,
        history: parsed.history || {},
        currentSession: parsed.currentSession || {},
        profile: parsed.profile || null,
        foodLog: parsed.foodLog || {} // { 'YYYY-MM-DD': [{ id, name, kcal, protein, carbs, fat, meal, time }] }
      };
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
  return { mode: 'train', currentDayIdx: 0, history: {}, currentSession: {}, profile: null, foodLog: {} };
}

function persistState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

let state = loadState();

function resetAllData() {
  if (confirm('Reset all training and nutrition data? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    state = { mode: 'train', currentDayIdx: 0, history: {}, currentSession: {}, profile: null, foodLog: {} };
    renderTabs();
    renderDay();
    closeModal();
  }
}

// ============================================================
// AUTO-PROGRESSION LOGIC
// Based on double-progression model (Schoenfeld 2017 dose-response):
// - Hit top of rep range across ALL sets with RIR ≤ 2 → +increment
// - Hit somewhere in range → hold weight, push reps
// - Missed bottom on 2+ sets → deload 10%
// ============================================================
function suggestNext(exercise) {
  const hist = state.history[exercise.id] || [];
  if (hist.length === 0) {
    return { weight: null, action: 'first', message: 'First session — pick a weight where you hit the LOW end of the rep range with 2–3 reps in reserve.' };
  }
  const last = hist[hist.length - 1];
  const sets = last.sets.filter(s => s.done && s.reps > 0);
  if (sets.length === 0) return { weight: null, action: 'first', message: 'No completed sets logged. Start fresh.' };

  const allHitTop = sets.every(s => s.reps >= exercise.repHigh);
  const avgRir = sets.reduce((a, s) => a + (parseInt(s.rir) || 0), 0) / sets.length;
  const missedBottom = sets.filter(s => s.reps < exercise.repLow).length;
  const lastWeight = sets[0].weight;

  if (allHitTop && avgRir <= 2) {
    return {
      weight: lastWeight + exercise.increment,
      action: 'up',
      message: `↑ +${exercise.increment} lb. You completed all sets at the top of the rep range (${exercise.repHigh}) with RIR ${avgRir.toFixed(1)}. Per Schoenfeld's dose-response data, progressive overload is the primary driver of continued hypertrophy.`
    };
  }
  if (missedBottom >= 2) {
    return {
      weight: Math.max(exercise.increment, Math.round((lastWeight * 0.9) / exercise.increment) * exercise.increment),
      action: 'down',
      message: `↓ Deload ~10%. You missed the bottom of the rep range (${exercise.repLow}) on multiple sets. Refalo 2022 confirms RIR 1–3 work matches failure for growth with less burnout.`
    };
  }
  return {
    weight: lastWeight,
    action: 'hold',
    message: `→ Hold weight, push reps. Aim for ${exercise.repHigh} on all sets before adding load.`
  };
}

// ============================================================
// RENDERING
// ============================================================
function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = PROGRAM.map((d, i) => `
    <button class="day-tab ${i === state.currentDayIdx ? 'active' : ''}" onclick="switchDay(${i})">
      <span class="day-num">${i + 1}</span>
      ${d.name}
    </button>
  `).join('');
}

function renderDay() {
  const day = PROGRAM[state.currentDayIdx];
  const view = document.getElementById('dayView');

  // Init current session for this day
  day.exercises.forEach(ex => {
    if (!state.currentSession[ex.id]) {
      const sug = suggestNext(ex);
      state.currentSession[ex.id] = Array.from({ length: ex.sets }, () => ({
        weight: sug.weight || '',
        reps: '',
        rir: '2',
        done: false
      }));
    }
  });

  const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
  const doneSets = day.exercises.reduce((a, e) => a + state.currentSession[e.id].filter(s => s.done).length, 0);

  view.innerHTML = `
    <div class="day-header">
      <div class="day-title">${day.name}</div>
      <div class="day-subtitle">${day.focus}</div>
      <div class="session-meta">
        <div>
          <div class="label">Exercises</div>
          <div class="val">${day.exercises.length}</div>
        </div>
        <div>
          <div class="label">Total Sets</div>
          <div class="val">${totalSets}</div>
        </div>
        <div>
          <div class="label">Completed</div>
          <div class="val">${doneSets}/${totalSets}</div>
        </div>
      </div>
    </div>
    ${day.exercises.map(ex => renderExercise(ex)).join('')}
  `;
}

function renderExercise(ex) {
  const sug = suggestNext(ex);
  const sets = state.currentSession[ex.id];
  const allDone = sets.every(s => s.done);
  const hist = state.history[ex.id] || [];
  const last = hist[hist.length - 1];

  return `
    <div class="exercise ${allDone ? 'complete' : ''}" id="ex-${ex.id}">
      <div class="ex-head" onclick="toggleExercise('${ex.id}')">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-tags">
            ${ex.tags.map(t => `<span class="ex-tag">${t}</span>`).join('')}
            <span class="ex-tag">${ex.sets}×${ex.repLow}–${ex.repHigh}</span>
            <span class="ex-tag">${ex.rest}s rest</span>
          </div>
        </div>
        <div class="ex-suggest">
          <div class="weight">${sug.weight !== null ? sug.weight + ' lb' : '—'}</div>
          <div class="label">${sug.action === 'up' ? '+ progress' : sug.action === 'down' ? '↓ deload' : sug.action === 'hold' ? '→ hold' : 'start here'}</div>
        </div>
      </div>
      <div class="ex-body">
        ${last ? `<div class="last-session">Last: <span>${last.sets.filter(s => s.done).map(s => `${s.weight}×${s.reps}`).join(' · ') || 'none logged'}</span></div>` : ''}
        <div class="set-row header">
          <div>Set</div>
          <div>Weight (lb)</div>
          <div>Reps</div>
          <div>RIR</div>
          <div></div>
        </div>
        ${sets.map((s, i) => `
          <div class="set-row ${s.done ? 'done' : ''}" id="set-${ex.id}-${i}">
            <div class="set-num">${i + 1}</div>
            <input type="number" inputmode="decimal" step="2.5" class="set-input" value="${s.weight}" onchange="updateSet('${ex.id}', ${i}, 'weight', this.value)" placeholder="—" />
            <input type="number" inputmode="numeric" class="set-input" value="${s.reps}" onchange="updateSet('${ex.id}', ${i}, 'reps', this.value)" placeholder="—" />
            <select class="rir-select" onchange="updateSet('${ex.id}', ${i}, 'rir', this.value)">
              ${[0,1,2,3,4].map(r => `<option value="${r}" ${s.rir == r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
            <button class="set-check" onclick="toggleSet('${ex.id}', ${i})" aria-label="Mark set complete">
              <svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 5" stroke="#0b0d0c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        `).join('')}
        <div class="progress-suggest ${sug.action === 'up' ? 'up' : sug.action === 'down' ? 'down' : 'hold'}">
          ${sug.message}
        </div>
      </div>
    </div>
  `;
}

function toggleExercise(id) {
  const el = document.getElementById('ex-' + id);
  el.classList.toggle('open');
}

function switchDay(i) {
  stopRestTimer();
  state.currentDayIdx = i;
  persistState();
  renderTabs();
  renderDay();
  window.scrollTo(0, 0);
}

function updateSet(exId, setIdx, field, value) {
  state.currentSession[exId][setIdx][field] = field === 'weight' ? parseFloat(value) || '' : (field === 'reps' ? parseInt(value) || '' : value);
  persistState();
}

function toggleSet(exId, setIdx) {
  const s = state.currentSession[exId][setIdx];
  s.done = !s.done;
  persistState();
  const row = document.getElementById(`set-${exId}-${setIdx}`);
  row.classList.toggle('done');
  // Re-render the meta counter
  const day = PROGRAM[state.currentDayIdx];
  const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
  const doneSets = day.exercises.reduce((a, e) => a + state.currentSession[e.id].filter(set => set.done).length, 0);
  const metaVals = document.querySelectorAll('.session-meta .val');
  if (metaVals[2]) metaVals[2].textContent = `${doneSets}/${totalSets}`;
  // Check if whole exercise complete
  const allDone = state.currentSession[exId].every(set => set.done);
  document.getElementById('ex-' + exId).classList.toggle('complete', allDone);
  // Auto-start rest timer when marking a set DONE (not when un-marking)
  if (s.done) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) startRestTimer(exId, setIdx, ex.rest);
  } else {
    // Un-toggling clears timer attached to that set
    if (restTimer.exId === exId && restTimer.setIdx === setIdx) stopRestTimer();
  }
}

// ============================================================
// REST TIMER — single global timer, auto-starts on set completion.
// Schoenfeld 2016 (PMID 26605807): 2–3 min rest > short rest for hypertrophy.
// ============================================================
let restTimer = {
  exId: null,
  setIdx: null,
  endsAt: 0,        // ms epoch
  intervalId: null,
  beeped: false
};

function startRestTimer(exId, setIdx, seconds) {
  stopRestTimer(); // cancel any existing timer (no concurrent timers)
  restTimer.exId = exId;
  restTimer.setIdx = setIdx;
  restTimer.endsAt = Date.now() + seconds * 1000;
  restTimer.beeped = false;
  renderRestTimer();
  restTimer.intervalId = setInterval(renderRestTimer, 250);
}

function stopRestTimer() {
  if (restTimer.intervalId) clearInterval(restTimer.intervalId);
  const old = document.querySelector('.rest-timer');
  if (old) old.remove();
  restTimer = { exId: null, setIdx: null, endsAt: 0, intervalId: null, beeped: false };
}

function addRestTime(deltaSeconds) {
  if (!restTimer.intervalId) return;
  restTimer.endsAt += deltaSeconds * 1000;
  if (restTimer.endsAt - Date.now() > 0) restTimer.beeped = false;
  renderRestTimer();
}

function renderRestTimer() {
  const { exId, setIdx, endsAt } = restTimer;
  if (!exId) return;
  const remainingMs = endsAt - Date.now();
  const remaining = Math.max(0, Math.ceil(remainingMs / 1000));
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const display = `${mins}:${String(secs).padStart(2, '0')}`;

  const setRow = document.getElementById(`set-${exId}-${setIdx}`);
  if (!setRow) { stopRestTimer(); return; }

  let timerEl = document.getElementById('rest-timer-el');
  const done = remaining === 0;

  // BUILD ONCE: create the element structure and attach event listeners
  // exactly one time. On subsequent ticks we only update text + classes.
  // This prevents the mobile tap-vs-rerender race where the click target
  // gets destroyed between touchstart (~0ms) and click (~300ms).
  if (!timerEl) {
    timerEl = document.createElement('div');
    timerEl.id = 'rest-timer-el';
    timerEl.className = 'rest-timer';
    timerEl.innerHTML = `
      <div class="rt-left">
        <div class="rt-label"></div>
        <div class="rt-time"></div>
      </div>
      <div class="rt-controls">
        <button type="button" class="rt-add">+15s</button>
        <button type="button" class="rt-skip danger">Skip</button>
      </div>
    `;
    // Attach listeners with both touchend (immediate, for mobile) and click
    // (for desktop / fallback). preventDefault on touchend stops the click
    // synthesis so the handler doesn't fire twice.
    const addBtn = timerEl.querySelector('.rt-add');
    const skipBtn = timerEl.querySelector('.rt-skip');
    const bind = (el, handler) => {
      let handled = false;
      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        handled = true;
        handler();
        setTimeout(() => { handled = false; }, 500);
      }, { passive: false });
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (handled) return;
        handler();
      });
    };
    bind(addBtn, () => addRestTime(15));
    bind(skipBtn, () => stopRestTimer());
    setRow.insertAdjacentElement('afterend', timerEl);
  } else if (timerEl.previousElementSibling !== setRow) {
    // Timer exists but is attached to a different set — move it.
    // Moving the element preserves its event listeners.
    setRow.insertAdjacentElement('afterend', timerEl);
  }

  // UPDATE ONLY: text content and classes. Buttons keep their listeners.
  timerEl.classList.toggle('done', done);
  const labelEl = timerEl.querySelector('.rt-label');
  const timeEl = timerEl.querySelector('.rt-time');
  const addBtn = timerEl.querySelector('.rt-add');
  const skipBtn = timerEl.querySelector('.rt-skip');
  const newLabel = done ? 'Rest complete · next set' : 'Rest timer';
  if (labelEl.textContent !== newLabel) labelEl.textContent = newLabel;
  if (timeEl.textContent !== display) timeEl.textContent = display;

  // When done, swap +15s/Skip → single Dismiss. Just toggle text + visibility
  // rather than rebuilding nodes, so the click target never disappears.
  if (done) {
    addBtn.style.display = 'none';
    if (skipBtn.textContent !== 'Dismiss') {
      skipBtn.textContent = 'Dismiss';
      skipBtn.classList.remove('danger');
    }
  } else {
    addBtn.style.display = '';
    if (skipBtn.textContent !== 'Skip') {
      skipBtn.textContent = 'Skip';
      skipBtn.classList.add('danger');
    }
  }

  // Beep + vibrate once when hitting zero
  if (done && !restTimer.beeped) {
    restTimer.beeped = true;
    playRestComplete();
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }
}

function playRestComplete() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beepAt = (when, freq, dur) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + when);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + when + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + when + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + when);
      o.stop(ctx.currentTime + when + dur + 0.05);
    };
    beepAt(0, 880, 0.18);
    beepAt(0.22, 1320, 0.22);
  } catch (e) {
    // Audio context may fail on iOS without user interaction; silent fail is fine.
  }
}

function saveSession() {
  stopRestTimer();
  const day = PROGRAM[state.currentDayIdx];
  const date = new Date().toISOString().slice(0, 10);
  let saved = 0;
  day.exercises.forEach(ex => {
    const sets = state.currentSession[ex.id];
    if (!sets) return;
    const hasData = sets.some(s => s.done);
    if (hasData) {
      if (!state.history[ex.id]) state.history[ex.id] = [];
      state.history[ex.id].push({
        date,
        sets: sets.map(s => ({ ...s }))
      });
      saved++;
      state.currentSession[ex.id] = null;
    }
  });
  state.currentSession = {};
  persistState();
  renderDay();
  alert(`Saved ${saved} exercises. Next session's weights will auto-adjust based on this performance.`);
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);

// Mifflin-St Jeor RMR equation (PMID: 2305711)
// Men: 10*kg + 6.25*cm - 5*age + 5
// Women: 10*kg + 6.25*cm - 5*age - 161
function calculateRMR(profile) {
  const kg = profile.weightLb / 2.205;
  const cm = profile.heightIn * 2.54;
  const base = 10 * kg + 6.25 * cm - 5 * profile.age;
  return Math.round(profile.sex === 'male' ? base + 5 : base - 161);
}

// TDEE = RMR * activity multiplier
// 1.375 = light activity (training 1-3x/wk)
// 1.55 = moderate (training 3-5x/wk) — our default for this program
// 1.725 = very active
function calculateTDEE(profile) {
  const rmr = calculateRMR(profile);
  const multipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, very: 1.725 };
  return Math.round(rmr * (multipliers[profile.activity] || 1.55));
}

// Targets based on goal
// Cut: -400 kcal (Murphy 2022 — stays under the ~500 kcal threshold that impairs LM)
// Maintain: 0
// Lean-gain: +200 kcal
function calculateTargets(profile) {
  const tdee = calculateTDEE(profile);
  const goalAdjust = { cut: -400, maintain: 0, gain: 250 };
  const targetKcal = tdee + goalAdjust[profile.goal];

  // Protein: 1.6 g/kg baseline (Morton 2018), bumped to 2.2 g/kg during cut (Helms)
  const kg = profile.weightLb / 2.205;
  const proteinPerKg = profile.goal === 'cut' ? 2.2 : 1.8;
  const proteinG = Math.round(kg * proteinPerKg);

  // Fat: 0.35 g/lb minimum for hormonal health
  const fatG = Math.round(profile.weightLb * 0.35);

  // Carbs: remainder
  const proteinKcal = proteinG * 4;
  const fatKcal = fatG * 9;
  const carbKcal = targetKcal - proteinKcal - fatKcal;
  const carbsG = Math.max(0, Math.round(carbKcal / 4));

  return { kcal: targetKcal, protein: proteinG, carbs: carbsG, fat: fatG, rmr: calculateRMR(profile), tdee };
}

function todayTotals() {
  const log = state.foodLog[todayKey()] || [];
  return log.reduce((acc, f) => ({
    kcal: acc.kcal + (f.kcal || 0),
    protein: acc.protein + (f.protein || 0),
    carbs: acc.carbs + (f.carbs || 0),
    fat: acc.fat + (f.fat || 0)
  }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
}

function renderQuickFoodList(items) {
  if (items.length === 0) {
    return `<div class="food-empty">No matches. Try a different search or add a custom food below.</div>`;
  }
  return items.map(f => {
    // Use the canonical index from QUICK_FOODS so addQuickFood works regardless of filtering
    const realIdx = QUICK_FOODS.indexOf(f);
    return `
      <button class="quick-food" onclick="addQuickFood(${realIdx})">
        <div class="qf-name">${f.name}</div>
        <div class="qf-macros">${f.kcal} cal · P${f.p} C${f.c} F${f.f}</div>
      </button>
    `;
  }).join('');
}

function filterFoods(catFromChip) {
  // Update active chip if called from a chip click
  if (catFromChip !== undefined) {
    document.querySelectorAll('#foodCatChips .food-cat-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.cat === catFromChip);
    });
  }
  const activeChip = document.querySelector('#foodCatChips .food-cat-chip.active');
  const cat = activeChip ? activeChip.dataset.cat : 'All';
  const q = (document.getElementById('foodSearch')?.value || '').trim().toLowerCase();
  const filtered = QUICK_FOODS.filter(f => {
    if (cat !== 'All' && f.cat !== cat) return false;
    if (q && !f.name.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('quickFoodsList').innerHTML = renderQuickFoodList(filtered);
}

function renderMacroCard(cls, label, current, target) {
  const pct = Math.min(100, target > 0 ? (current / target) * 100 : 0);
  return `
    <div class="macro-card ${cls}">
      <div class="macro-label">${label}</div>
      <div class="macro-val">${Math.round(current)}</div>
      <div class="macro-target">/ ${target}g</div>
      <div class="macro-bar"><div class="macro-bar-fill" style="width: ${pct}%"></div></div>
    </div>
  `;
}

function renderFoodLog() {
  const log = state.foodLog[todayKey()] || [];
  if (log.length === 0) {
    return `<div class="empty">No food logged yet today.<br/>Tap a quick add above or build a custom entry.</div>`;
  }
  const byMeal = {};
  MEAL_BUCKETS.forEach(m => byMeal[m] = []);
  log.forEach(f => { (byMeal[f.meal] || (byMeal[f.meal] = [])).push(f); });

  return MEAL_BUCKETS.filter(m => byMeal[m] && byMeal[m].length).map(meal => {
    const items = byMeal[meal];
    const mealKcal = items.reduce((a, f) => a + (f.kcal || 0), 0);
    return `
      <div class="meal-group">
        <div class="meal-header"><span>${meal}</span><span class="meal-kcal">${mealKcal} cal</span></div>
        ${items.map(f => `
          <div class="food-entry">
            <div style="flex:1; min-width:0;">
              <div class="name">${f.name}</div>
              <div class="breakdown">P${f.protein} · C${f.carbs} · F${f.fat}</div>

            <div class="kcal-pill">${f.kcal}</div>
            <button class="delete-btn" onclick="deleteFood('${f.id}')" aria-label="Delete">×</button>

      </div>
    `;
  }).join('');
}

function saveProfile() {
  const wEl = document.getElementById('p-weight');
  const hEl = document.getElementById('p-height');
  const aEl = document.getElementById('p-age');
  if (!wEl || !hEl || !aEl) {
    alert('Form elements not found. Please reload the page.');
    return;
  }
  const weight = parseFloat(wEl.value);
  const height = parseFloat(hEl.value);
  const age = parseInt(aEl.value);
  const missing = [];
  if (!weight || isNaN(weight)) missing.push('weight');
  if (!height || isNaN(height)) missing.push('height');
  if (!age || isNaN(age)) missing.push('age');
  if (missing.length) {
    alert('Please enter: ' + missing.join(', '));
    return;
  }
  state.profile = {
    weightLb: weight,
    heightIn: height,
    age: age,
    sex: document.getElementById('p-sex').value || 'male',
    activity: document.getElementById('p-activity').value || 'moderate',
    goal: document.getElementById('p-goal').value || 'cut'
  };
  persistState();
  renderNutrition();
}

function editProfile() {
  // Pre-fill values in the setup form by clearing profile and re-rendering, then restoring values
  const p = state.profile;
  state.profile = null;
  renderNutrition();
  // Pre-populate
  setTimeout(() => {
    document.getElementById('p-weight').value = p.weightLb;
    document.getElementById('p-height').value = p.heightIn;
    document.getElementById('p-age').value = p.age;
    document.getElementById('p-sex').value = p.sex;
    document.getElementById('p-activity').value = p.activity;
    document.getElementById('p-goal').value = p.goal;
  }, 50);
}

function addQuickFood(idx) {
  const f = QUICK_FOODS[idx];
  // Pick default meal based on time
  const hour = new Date().getHours();
  const meal = hour < 11 ? 'Breakfast' : hour < 15 ? 'Lunch' : hour < 20 ? 'Dinner' : 'Snack';
  logFood({ name: f.name, kcal: f.kcal, protein: f.p, carbs: f.c, fat: f.f, meal });
}

function addCustomFood() {
  const name = document.getElementById('cf-name').value.trim();
  const kcal = parseFloat(document.getElementById('cf-kcal').value) || 0;
  const protein = parseFloat(document.getElementById('cf-p').value) || 0;
  const carbs = parseFloat(document.getElementById('cf-c').value) || 0;
  const fat = parseFloat(document.getElementById('cf-f').value) || 0;
  const meal = document.getElementById('cf-meal').value;
  if (!name) {
    alert('Add a name for the food.');
    return;
  }
  logFood({ name, kcal, protein, carbs, fat, meal });
  // Clear form
  ['cf-name', 'cf-kcal', 'cf-p', 'cf-c', 'cf-f'].forEach(id => document.getElementById(id).value = '');
}

function logFood(food) {
  const key = todayKey();
  if (!state.foodLog[key]) state.foodLog[key] = [];
  state.foodLog[key].push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    ...food,
    time: new Date().toISOString()
  });
  persistState();
  renderNutrition();
}

function deleteFood(id) {
  const key = todayKey();
  if (!state.foodLog[key]) return;
  state.foodLog[key] = state.foodLog[key].filter(f => f.id !== id);
  persistState();
  renderNutrition();
}

function openNutriHistory() {
  if (!state.profile) {
    openModal(`<h2>Nutrition History</h2><div class="sub">Set up your profile first</div><button class="nav-btn primary" style="width:100%;margin-top:16px;" onclick="closeModal()">Close</button>`);
    return;
  }
  const targets = calculateTargets(state.profile);
  const dates = Object.keys(state.foodLog).sort().reverse();
  if (dates.length === 0) {
    openModal(`
      <h2>Nutrition History</h2>
      <div class="sub">No logged days yet</div>
      <p style="color:var(--ink-dim);font-size:12px;line-height:1.6;">
        Log meals throughout the day. At the end of each day, the totals are automatically saved here so you can review week-over-week trends.
      </p>
      <p style="color:var(--ink-dim);font-size:11px;line-height:1.5;margin-top:10px;">
        Have a backup file? Tap Restore below.
      </p>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="nav-btn" style="flex:1;" onclick="triggerImport()">Restore (Import)</button>
        <button class="nav-btn primary" style="flex:1;" onclick="closeModal()">Close</button>
      </div>
    `);
    return;
  }

  // Build chart data — last 14 days
  const last14 = dates.slice(0, 14).reverse();

  let avgKcal = 0, avgP = 0, avgC = 0, avgF = 0;
  last14.forEach(d => {
    const totals = (state.foodLog[d] || []).reduce((a, f) => ({
      kcal: a.kcal + (f.kcal || 0),
      protein: a.protein + (f.protein || 0),
      carbs: a.carbs + (f.carbs || 0),
      fat: a.fat + (f.fat || 0)
    }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    avgKcal += totals.kcal;
    avgP += totals.protein;
    avgC += totals.carbs;
    avgF += totals.fat;
  });
  const n = last14.length;
  avgKcal = Math.round(avgKcal / n);
  avgP = Math.round(avgP / n);
  avgC = Math.round(avgC / n);
  avgF = Math.round(avgF / n);

  openModal(`
    <h2>Nutrition History</h2>
    <div class="sub">${dates.length} day${dates.length === 1 ? '' : 's'} logged · ${n}-day average shown</div>

    <div style="background: var(--panel-2); padding: 14px; border-radius: 10px; margin-bottom: 16px;">
      <div style="font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;">${n}-day average vs target</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;">
        <div>calories: <strong style="color:var(--accent);">${avgKcal}</strong> / ${targets.kcal}</div>
        <div>protein: <strong style="color:var(--accent);">${avgP}g</strong> / ${targets.protein}g</div>
        <div>carbs: <strong style="color:var(--warn);">${avgC}g</strong> / ${targets.carbs}g</div>
        <div>fat: <strong style="color:var(--accent-2);">${avgF}g</strong> / ${targets.fat}g</div>
      </div>
    </div>

    <div style="font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;">Daily log</div>
    ${dates.map(date => {
      const log = state.foodLog[date] || [];
      const totals = log.reduce((a, f) => ({
        kcal: a.kcal + (f.kcal || 0),
        protein: a.protein + (f.protein || 0),
        carbs: a.carbs + (f.carbs || 0),
        fat: a.fat + (f.fat || 0)
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
      const diff = totals.kcal - targets.kcal;
      const isToday = date === todayKey();
      const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const proteinPct = Math.round((totals.protein / targets.protein) * 100);
      return `
        <div style="padding:12px 0;border-bottom:1px dashed var(--line);">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
            <div style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;">${dateLabel}${isToday ? ' · today' : ''}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${diff > 100 ? 'var(--accent-2)' : diff < -100 ? 'var(--warn)' : 'var(--ok)'};">
              ${diff >= 0 ? '+' : ''}${diff} cal
            </div>
          </div>
          <div style="font-size:11px;color:var(--ink-dim);font-family:'JetBrains Mono',monospace;">
            ${totals.kcal} cal · P${totals.protein} (${proteinPct}%) · C${totals.carbs} · F${totals.fat} · ${log.length} item${log.length === 1 ? '' : 's'}
          </div>
        </div>
      `;
    }).join('')}

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px;">
      <button class="nav-btn" onclick="exportAll()">Backup (Export)</button>
      <button class="nav-btn" onclick="triggerImport()">Restore (Import)</button>
    </div>
    <button class="nav-btn primary" style="width: 100%; margin-top: 8px;" onclick="closeModal()">Close</button>
  `);
}

// ============================================================
// BACKUP & RESTORE
// One JSON contains everything: training history, current session,
// profile, and food log. Designed so a deploy that resets localStorage
// (or a new device) can be recovered from a single downloaded file.
// ============================================================
const BACKUP_SCHEMA_VERSION = 1;

function exportAll() {
  const payload = {
    schema: BACKUP_SCHEMA_VERSION,
    app: 'stimulus',
    exportedAt: new Date().toISOString(),
    history: state.history,
    currentSession: state.currentSession,
    profile: state.profile,
    foodLog: state.foodLog
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `stimulus-backup-${todayKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Legacy alias — the nutrition modal used to call this name.
function exportNutrition() { exportAll(); }

function triggerImport() {
  // Create a hidden file input on the fly. Reusing one across imports
  // sometimes fails to fire `change` if the same file is picked twice.
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.style.display = 'none';
  input.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) handleImportFile(file);
    document.body.removeChild(input);
  });
  document.body.appendChild(input);
  input.click();
}

function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    let parsed;
    try {
      parsed = JSON.parse(e.target.result);
    } catch (err) {
      alert('That file isn\'t valid JSON.\n\n' + err.message);
      return;
    }
    applyImport(parsed);
  };
  reader.onerror = () => alert('Couldn\'t read that file.');
  reader.readAsText(file);
}

function applyImport(parsed) {
  // Accept either a full backup (history + foodLog + profile) or the older
  // nutrition-only export (profile + foodLog). Be lenient about which fields
  // are present — restore what's there, leave the rest alone.
  if (!parsed || typeof parsed !== 'object') {
    alert('That file doesn\'t look like a Stimulus backup.');
    return;
  }

  const hasTraining = parsed.history && typeof parsed.history === 'object';
  const hasNutrition = parsed.foodLog && typeof parsed.foodLog === 'object';
  const hasProfile = parsed.profile && typeof parsed.profile === 'object';

  if (!hasTraining && !hasNutrition && !hasProfile) {
    alert('No recognizable data in that file. Expected a Stimulus export.');
    return;
  }

  // Summarize what we found so the user can decide whether to proceed.
  const trainingExCount = hasTraining ? Object.keys(parsed.history).length : 0;
  const trainingSessions = hasTraining
    ? Object.values(parsed.history).reduce((n, arr) => n + (Array.isArray(arr) ? arr.length : 0), 0)
    : 0;
  const foodDayCount = hasNutrition ? Object.keys(parsed.foodLog).length : 0;
  const summary = [
    hasProfile ? '• Profile (weight/height/age/goal)' : null,
    hasTraining ? `• Training history: ${trainingExCount} exercises, ${trainingSessions} sessions` : null,
    hasNutrition ? `• Nutrition log: ${foodDayCount} days` : null
  ].filter(Boolean).join('\n');

  const ok = confirm(
    'Restore from this backup?\n\n' +
    summary +
    '\n\nThis will OVERWRITE your current data. Export first if you want a safety copy.'
  );
  if (!ok) return;

  if (hasProfile) state.profile = parsed.profile;
  if (hasTraining) state.history = parsed.history;
  if (hasNutrition) state.foodLog = parsed.foodLog;
  // currentSession is in-progress data — only restore if explicitly present.
  // Otherwise leave the user's current in-progress workout untouched.
  if (parsed.currentSession && typeof parsed.currentSession === 'object') {
    state.currentSession = parsed.currentSession;
  }

  persistState();
  closeModal();
  // Re-render whichever view is active so the restored data shows immediately.
  renderTabs();
  renderDay();
  if (state.mode === 'fuel') renderNutrition();
  alert('Restored successfully.');
}

// Init
renderTabs();
renderDay();
if (state.mode === 'fuel') switchMode('fuel');

// Expose all functions to window for inline onclick handlers
// (necessary in some sandboxed contexts where script scope isn't global)
window.switchDay = switchDay;
window.switchMode = switchMode;
window.toggleExercise = toggleExercise;
window.updateSet = updateSet;
window.toggleSet = toggleSet;
window.saveSession = saveSession;
window.openModal = openModal;
window.closeModal = closeModal;
window.openScience = openScience;
window.openHistory = openHistory;
window.resetAllData = resetAllData;
window.saveProfile = saveProfile;
window.editProfile = editProfile;
window.addQuickFood = addQuickFood;
window.addCustomFood = addCustomFood;
window.deleteFood = deleteFood;
window.openNutriHistory = openNutriHistory;
window.exportNutrition = exportNutrition;
window.exportAll = exportAll;
window.triggerImport = triggerImport;
window.stopRestTimer = stopRestTimer;
window.addRestTime = addRestTime;
window.filterFoods = filterFoods;
</script>
